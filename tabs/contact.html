<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="tabs.css">
    <script src="/script.js" defer></script>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="card">
        <header>
            <div class="logo">
                <a href="/index.html">
                    <img src="/images/tqLogo.png" alt="TQ Logo">
                </a>
            </div>
            <nav>
                <ul id="nav-links">
                    <li><a href="/tabs/about.html">About</a></li>
                    <li><a href="/tabs/experience.html">Experience</a></li>
                    <li><a href="/tabs/project.html">Projects</a></li>
                    <li><a href="/tabs/contact.html">Contact</a></li>
                </ul>
                <div id="menu-toggle">☰</div>
            </nav>
        </header>

        <main>
            <section class="contact">
                <h2>Contact Me</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4" required></textarea>
                    </div>
                    <button type="submit">Send Message</button>
                </form>
                <div id="form-feedback" class="hidden">Thanks for reaching out! I’ll get back to you soon. 👋</div>
            </section>

        </main>

</body>

</html>
